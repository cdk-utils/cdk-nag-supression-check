queue_rules:
  - name: default
    update_method: merge
    queue_conditions:
      - '#approved-reviews-by>=1'
      - -label~=(do-not-merge)
      - status-success=Check dist/
      - status-success=Analyze (typescript)
      - status-success=TypeScript Tests
      - status-success=GitHub Actions Test
    merge_method: squash
    commit_message_template: |-
      {{ title }} (#{{ number }})

      {{ body }}
pull_request_rules:
  - name: Automatic merge on approval and successful build
    actions:
      queue:
        name: default
    conditions:
      - '#approved-reviews-by>=1'
      - -label~=(do-not-merge)
      - status-success=Check dist/
      - status-success=Analyze (typescript)
      - status-success=TypeScript Tests
      - status-success=GitHub Actions Test
  - name: Add Blocking label on default PRs
    actions:
      label:
        add:
          - do-not-merge
    conditions:
      - author=Lorenzohidalgo
      - -label~=(do-not-merge)
      - -label~=(merge)
  - name: Auto Approve on admin PR
    actions:
      comment:
        message: |-
          @{{author}}, this PR was auto-approved.
          Remember to remove the do-not-merge once ready to merge
      review:
        type: APPROVE
    conditions:
      - author=Lorenzohidalgo
      - label=do-not-merge
merge_queue:
  max_parallel_checks: 1
merge_protections_settings:
  reporting_method: check-runs
